<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="클릭해서 왁스가 깨지고 말랑한 속을 누르는 왁뿌볼 ASMR 장난감">
  <title>왁뿌볼</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='26' fill='%23fff1a8'/%3E%3Cpath d='M31 13l4 18-7 20' stroke='%233b2518' stroke-width='5' stroke-linecap='round' fill='none'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app" data-app>
    <section class="stage" aria-labelledby="title">
      <p class="eyebrow">손끝으로 부수는 ASMR</p>
      <h1 id="title">왁뿌볼</h1>
      <p class="status" data-status>클릭해서 왁스를 깨보세요</p>
      <p class="sr-only" data-live-status role="status" aria-live="polite" aria-atomic="true">클릭해서 왁스를 깨보세요. 0 / 7</p>

      <button class="ball" type="button" data-ball aria-label="왁뿌볼 누르기">
        <span class="wax" aria-hidden="true"></span>
        <span class="inside" aria-hidden="true"></span>
        <svg class="fracture-svg" viewBox="0 0 100 100" aria-hidden="true" focusable="false">
          <g class="fracture-lines">
            <path class="fracture-path" data-stage="1" d="M52 49 L49 44 L51 40 L48 36 L50 31 L47 27 L48 21" vector-effect="non-scaling-stroke" pathLength="1" />
            <path class="fracture-path" data-stage="2" d="M49 41 L45 39 L43 35 L39 36 L37 31 L32 32 L27 27" vector-effect="non-scaling-stroke" pathLength="1" />
            <path class="fracture-path" data-stage="2" d="M51 38 L56 37 L58 33 L62 34 L64 29 L69 30 L75 22" vector-effect="non-scaling-stroke" pathLength="1" />
            <path class="fracture-path" data-stage="3" d="M52 49 L57 47 L61 50 L65 47 L70 49 L74 45 L82 48" vector-effect="non-scaling-stroke" pathLength="1" />
            <path class="fracture-path" data-stage="3" d="M43 38 L41 43 L42 47 L37 49 L35 53 L30 52 L21 63" vector-effect="non-scaling-stroke" pathLength="1" />
            <path class="fracture-path" data-stage="4" d="M52 49 L55 54 L52 59 L56 63 L54 68 L60 74 L56 87" vector-effect="non-scaling-stroke" pathLength="1" />
            <path class="fracture-path" data-stage="4" d="M62 49 L65 54 L70 53 L72 58 L77 58 L79 64 L87 69" vector-effect="non-scaling-stroke" pathLength="1" />
            <path class="fracture-path" data-stage="5" d="M40 48 L43 53 L40 58 L42 62 L37 66 L38 71 L29 82" vector-effect="non-scaling-stroke" pathLength="1" />
            <path class="fracture-path" data-stage="5" d="M68 56 L65 61 L68 65 L66 69 L72 72 L70 77 L79 84" vector-effect="non-scaling-stroke" pathLength="1" />
            <path class="fracture-path fracture-path-major" data-stage="6" d="M27 55 L33 57 L38 53 L43 55 L49 49 L55 51 L61 48 L66 53 L69 58 L66 63 L64 68" vector-effect="non-scaling-stroke" pathLength="1" />
          </g>
          <g class="break-holes">
            <path class="break-hole hole-a" data-stage="2" d="M43 30 L48 28 L54 32 L53 36 L56 38 L51 42 L46 40 L42 38 L40 34 Z" />
            <path class="break-hole hole-b" data-stage="3" d="M27 43 L33 40 L40 42 L39 46 L43 49 L38 55 L33 53 L29 56 L25 51 L24 47 Z" />
            <path class="break-hole hole-c" data-stage="3" d="M62 37 L67 35 L74 38 L72 42 L77 45 L72 51 L67 49 L63 52 L60 47 L58 42 Z" />
            <path class="break-hole hole-d" data-stage="4" d="M42 56 L48 53 L57 56 L55 61 L61 64 L56 72 L50 69 L46 74 L41 68 L38 62 Z" />
            <path class="break-hole hole-e" data-stage="5" d="M19 60 L26 56 L35 59 L33 64 L39 68 L33 76 L27 73 L22 78 L17 71 L15 66 Z" />
            <path class="break-hole hole-f" data-stage="6" d="M63 59 L71 55 L82 60 L79 65 L87 70 L80 79 L73 76 L68 82 L62 74 L58 67 Z" />
          </g>
          <g class="wax-fragments">
            <path class="wax-fragment fragment-a" data-stage="2" d="M42 30 L48 28 L54 32 L53 36 L56 38 L51 42 L46 40 L42 38 L40 34 Z" />
            <path class="wax-fragment fragment-b" data-stage="3" d="M27 43 L33 40 L40 42 L39 46 L43 49 L38 55 L33 53 L29 56 L25 51 L24 47 Z" />
            <path class="wax-fragment fragment-c" data-stage="3" d="M62 37 L67 35 L74 38 L72 42 L77 45 L72 51 L67 49 L63 52 L60 47 L58 42 Z" />
            <path class="wax-fragment fragment-d" data-stage="4" d="M42 56 L48 53 L57 56 L55 61 L61 64 L56 72 L50 69 L46 74 L41 68 L38 62 Z" />
            <path class="wax-fragment fragment-e" data-stage="5" d="M19 60 L26 56 L35 59 L33 64 L39 68 L33 76 L27 73 L22 78 L17 71 L15 66 Z" />
            <path class="wax-fragment fragment-f" data-stage="6" d="M63 59 L71 55 L82 60 L79 65 L87 70 L80 79 L73 76 L68 82 L62 74 L58 67 Z" />
            <path class="wax-fragment fragment-g" data-stage="6" d="M34 16 L40 13 L49 17 L47 21 L52 25 L47 31 L41 29 L37 32 L33 26 L31 21 Z" />
            <path class="wax-fragment fragment-h" data-stage="6" d="M71 20 L78 18 L85 24 L82 29 L87 33 L81 39 L75 36 L71 40 L68 33 L66 27 Z" />
          </g>
        </svg>
        <span class="impact-bloom" aria-hidden="true"></span>
        <span class="squish-pulse" aria-hidden="true"></span>
      </button>
    </section>

    <section class="actions" aria-label="다시하기와 광고">
      <button class="reset" type="button" data-reset>다시하기</button>
      <div class="ad ad-inline" aria-label="광고 영역">광고 영역</div>
    </section>

    <div class="ad ad-bottom" aria-label="하단 광고 영역">하단 광고 영역</div>
  </main>
  <script type="module" src="./app.js"></script>
</body>
</html>
