<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="클릭해서 왁스가 깨지고 말랑한 속을 누르는 왁뿌볼 ASMR 장난감">
  <title>왁뿌볼</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='26' fill='%23fff1a8'/%3E%3Cpath d='M31 13l4 18-7 20' stroke='%233b2518' stroke-width='5' stroke-linecap='round' fill='none'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app" data-app>
    <section class="stage" aria-labelledby="title">
      <p class="eyebrow">손끝으로 부수는 ASMR</p>
      <h1 id="title">왁뿌볼</h1>
      <p class="status" data-status>클릭해서 왁스를 깨보세요</p>
      <p class="sr-only" data-live-status role="status" aria-live="polite" aria-atomic="true">클릭해서 왁스를 깨보세요. 0 / 7</p>

      <button class="ball" type="button" data-ball aria-label="왁뿌볼 누르기">
        <span class="wax" aria-hidden="true"></span>
        <span class="inside" aria-hidden="true"></span>
        <svg class="fracture-svg" viewBox="0 0 100 100" aria-hidden="true" focusable="false">
          <g class="fracture-lines">
            <path class="fracture-path" data-stage="1" d="M52 48 Q48 43 50 38 Q53 33 49 28 Q46 24 47 19" vector-effect="non-scaling-stroke" pathLength="1" />
            <path class="fracture-path" data-stage="2" d="M49 40 Q44 38 41 34 Q38 29 34 31 Q30 31 26 26" vector-effect="non-scaling-stroke" pathLength="1" />
            <path class="fracture-path" data-stage="2" d="M51 37 Q56 36 59 32 Q62 27 67 28 Q71 26 75 20" vector-effect="non-scaling-stroke" pathLength="1" />
            <path class="fracture-path" data-stage="3" d="M52 48 Q58 45 62 48 Q67 51 71 46 Q76 43 82 47" vector-effect="non-scaling-stroke" pathLength="1" />
            <path class="fracture-path" data-stage="3" d="M43 37 Q40 42 41 47 Q37 50 33 49 Q27 52 20 63" vector-effect="non-scaling-stroke" pathLength="1" />
            <path class="fracture-path" data-stage="4" d="M52 48 Q55 54 53 59 Q51 64 55 68 Q61 74 56 88" vector-effect="non-scaling-stroke" pathLength="1" />
            <path class="fracture-path" data-stage="4" d="M62 48 Q65 54 70 55 Q74 56 77 61 Q82 63 87 69" vector-effect="non-scaling-stroke" pathLength="1" />
            <path class="fracture-path" data-stage="5" d="M40 47 Q43 54 40 59 Q35 64 36 69 Q34 75 29 83" vector-effect="non-scaling-stroke" pathLength="1" />
            <path class="fracture-path" data-stage="5" d="M68 56 Q65 62 67 67 Q73 72 70 77 Q75 80 79 85" vector-effect="non-scaling-stroke" pathLength="1" />
            <path class="fracture-path fracture-path-major" data-stage="6" d="M27 54 Q34 57 39 52 Q45 49 50 48 Q57 46 62 49 Q67 53 68 58 Q66 63 64 68" vector-effect="non-scaling-stroke" pathLength="1" />
          </g>
          <g class="break-holes">
            <path class="break-hole hole-a" data-stage="2" d="M43 31 Q48 27 53 31 Q56 36 52 41 Q46 43 42 38 Q40 34 43 31Z" />
            <path class="break-hole hole-b" data-stage="3" d="M28 44 Q34 39 40 43 Q43 49 38 55 Q31 57 27 52 Q24 48 28 44Z" />
            <path class="break-hole hole-c" data-stage="3" d="M62 38 Q68 34 74 39 Q77 45 72 50 Q65 52 61 47 Q58 42 62 38Z" />
            <path class="break-hole hole-d" data-stage="4" d="M43 57 Q50 52 57 57 Q61 64 56 71 Q48 74 42 68 Q38 63 43 57Z" />
            <path class="break-hole hole-e" data-stage="5" d="M20 61 Q27 55 35 60 Q39 68 33 75 Q24 78 18 71 Q15 66 20 61Z" />
            <path class="break-hole hole-f" data-stage="6" d="M64 60 Q74 54 82 61 Q87 70 80 78 Q69 82 62 74 Q58 67 64 60Z" />
          </g>
          <g class="wax-fragments">
            <path class="wax-fragment fragment-a" data-stage="2" d="M42 31 Q48 27 54 32 Q56 37 51 42 Q45 43 41 38 Q39 34 42 31Z" />
            <path class="wax-fragment fragment-b" data-stage="3" d="M27 44 Q34 39 41 43 Q43 49 38 55 Q30 57 26 51 Q24 47 27 44Z" />
            <path class="wax-fragment fragment-c" data-stage="3" d="M62 38 Q69 34 75 40 Q77 46 71 51 Q64 52 60 46 Q59 41 62 38Z" />
            <path class="wax-fragment fragment-d" data-stage="4" d="M42 57 Q50 52 58 58 Q61 65 55 72 Q47 74 41 68 Q38 62 42 57Z" />
            <path class="wax-fragment fragment-e" data-stage="5" d="M19 61 Q27 55 36 60 Q39 68 33 76 Q24 78 18 71 Q15 66 19 61Z" />
            <path class="wax-fragment fragment-f" data-stage="6" d="M64 60 Q74 54 83 61 Q87 70 80 79 Q69 82 62 74 Q58 67 64 60Z" />
            <path class="wax-fragment fragment-g" data-stage="6" d="M35 16 Q43 12 50 18 Q53 25 47 31 Q38 32 33 25 Q31 20 35 16Z" />
            <path class="wax-fragment fragment-h" data-stage="6" d="M72 20 Q80 18 85 25 Q87 33 81 38 Q73 39 68 33 Q66 26 72 20Z" />
          </g>
        </svg>
        <span class="impact-bloom" aria-hidden="true"></span>
        <span class="squish-pulse" aria-hidden="true"></span>
      </button>
    </section>

    <section class="actions" aria-label="다시하기와 광고">
      <button class="reset" type="button" data-reset>다시하기</button>
      <div class="ad ad-inline" aria-label="광고 영역">광고 영역</div>
    </section>

    <div class="ad ad-bottom" aria-label="하단 광고 영역">하단 광고 영역</div>
  </main>
  <script type="module" src="./app.js"></script>
</body>
</html>
